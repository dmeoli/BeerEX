name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true        # brings in third_party/FuzzyCLIPS/fuzzy.clp
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt ruff
      - name: Lint
        run: ruff check BeerEX.bot.py tests/test_engine.py
      - name: Compile
        run: python -m py_compile BeerEX.bot.py
      - name: Engine smoke test (clipspy)
        run: python tests/test_engine.py

  docker:
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: docker/setup-qemu-action@v3      # enables arm64 emulation
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64   # runs on amd64 and ARM hosts
          tags: ghcr.io/${{ github.repository_owner }}/beerex:latest
